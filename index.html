<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,700;1,400;1,800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <script src="https://cdn.jsdelivr.net/npm/@js-temporal/polyfill@0.5.1/dist/index.umd.js"></script>
    <script type="module" src="main.js"></script>

    <title>Frontend Mentor | Age calculator app</title>
  </head>
  <body class="page-layout">
    <main>
      <form novalidate>
        <fieldset class="input-mask">
          <legend>
            <h1 class="visually-hidden">
              Enter your date of birth, and we'll calculate your age!
            </h1>
          </legend>

          <div class="input-wrapper">
            <label for="day">Day</label>
            <input
              type="number"
              name="day"
              id="day"
              placeholder="DD"
              min="1"
              max="31"
              required
              inputmode="numeric"
              autocomplete="off"
            />
            <span aria-live="polite" data-error-for="day" for="day"></span>
          </div>

          <div class="input-wrapper">
            <label for="month">Month</label>
            <input
              type="number"
              name="month"
              id="month"
              placeholder="MM"
              min="1"
              max="12"
              required
              inputmode="numeric"
              autocomplete="off"
            />
            <span aria-live="polite" data-error-for="month" for="month"></span>
          </div>

          <div class="input-wrapper">
            <label for="year">Year</label>
            <input
              type="number"
              name="year"
              id="year"
              placeholder="YYYY"
              min="1"
              required
              inputmode="numeric"
              autocomplete="off"
            />
            <span aria-live="polite" data-error-for="year" for="year"></span>
          </div>
        </fieldset>
        <span aria-live="polite" data-error-for="date"></span>

        <div class="button-divider">
          <hr />

          <button type="submit" aria-label="Calculate age">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 46 44">
              <path
                fill="none"
                stroke="#fff"
                stroke-width="2"
                d="M1 22.019C8.333 21.686 23 25.616 23 44m0 0V0m22 22.019C37.667 21.686 23 25.616 23 44"
              />
            </svg>
          </button>
        </div>
      </form>

      <output class="age-output" aria-hidden="true">
        <div>
          <span data-output-for="year">--</span>
          years
        </div>
        <div>
          <span data-output-for="month">--</span>
          months
        </div>
        <div>
          <span data-output-for="day">--</span>
          days
        </div>
      </output>

      <output class="age-annoucement visually-hidden"></output>
    </main>
  </body>
</html>
