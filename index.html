<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,700;1,400;1,800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | Age calculator app</title>
  </head>
  <body class="page-layout">
    <main>
      <form>
        <div class="input-mask">
          <div class="input-wrapper">
            <label for="day">Day</label>
            <input type="text" name="day" placeholder="DD" maxlength="2" />
          </div>

          <div class="input-wrapper">
            <label for="month">Month</label>
            <input type="text" name="month" placeholder="MM" maxlength="2" />
          </div>

          <div class="input-wrapper">
            <label for="year">Year</label>
            <input type="text" name="year" placeholder="YYYY" maxlength="4" />
          </div>
        </div>

        <div class="button-divider">
          <hr />

          <button>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 46 44">
              <path
                fill="none"
                stroke="#fff"
                stroke-width="2"
                d="M1 22.019C8.333 21.686 23 25.616 23 44m0 0V0m22 22.019C37.667 21.686 23 25.616 23 44"
              />
            </svg>
          </button>
        </div>
      </form>

      <output for="year"><span id="year">--</span> years</output>

      <output for="month"><span id="month">--</span> months</output>

      <output for="day"><span id="day">--</span> days</output>
    </main>
  </body>
</html>
