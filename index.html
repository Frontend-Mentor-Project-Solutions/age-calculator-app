<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Age calculator app</title>
  </head>
  <body>
    <main>
      <form>
        <div class="input-wrapper">
          <label for="day">Day</label>
          <input type="text" id="day" placeholder="DD" maxlength="2" />
        </div>

        <div class="input-wrapper">
          <label for="month">Month</label>
          <input type="text" id="month" placeholder="MM" maxlength="2" />
        </div>

        <div class="input-wrapper">
          <label for="year">Year</label>
          <input type="text" id="year" placeholder="YYYY" maxlength="4" />
        </div>

        <button>Calculate</button>
      </form>

      <output>
        <p><span id="years">--</span> years</p>
        <p><span id="months">--</span> months</p>
        <p><span id="days">--</span> days</p>
      </output>
    </main>
  </body>
</html>
